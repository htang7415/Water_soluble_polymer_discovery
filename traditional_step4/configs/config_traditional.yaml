paths:
  # Base directory for all isolated traditional Step 4 outputs.
  results_root: "traditional_step4"
  # Existing DiT config path used by step4_4 comparison to locate DiT outputs.
  dit_config_path: "configs/config.yaml"

data:
  random_seed: 42

plotting:
  font_size: 16
  dpi: 600

traditional_step4:
  shared:
    regression_dataset_path: "Data/chi/polymers_T_phi.csv"
    classification_dataset_path:
      - "Data/water_solvent/water_miscible_polymer.csv"
      - "Data/water_solvent/water_immiscible_polymer.csv"
    split_mode: "polymer"  # polymer | random
    classification_split_mode: "polymer"  # split mode used by step4_3_2 only (independent of regression split_mode)
    split:
      # Holdout ratio for the one-time test split.
      # Train set is (1 - holdout_test_ratio), and CV is performed only inside train.
      holdout_test_ratio: 0.10
    fingerprint:
      radius: 3
      n_bits: 1024
      use_chirality: false
      use_features: false

  # Step4_3_1: traditional chi regression on Morgan fingerprints
  # Main pipeline uses one random_seed per run; optional multi-seed evaluation is handled by traditional_step4/scripts/step4_3_1_multiseed_eval.py.
  step4_3_1_regression:
    tune: true
    n_trials: 50
    tuning_cv_folds: 5
    tuning_objective: "val_poly_nrmse"  # "val_r2" | "val_poly_nrmse"
    nrmse_std_floor: 0.02
    nrmse_clip: 10.0
    models:
      - "ridge"
      - "random_forest"
      - "xgboost"
      - "mlp"
      - "gpr"
    # Optional per-model knobs; script fills robust defaults when keys are omitted.
    optuna_search_space:
      ridge_alpha: [1.0e-3, 1.0e2]
      ridge_fit_intercept: [true]
      random_forest_n_estimators: [200, 800]
      random_forest_max_depth: [3, 20]
      random_forest_min_samples_split: [2, 12]
      random_forest_min_samples_leaf: [1, 6]
      random_forest_max_features: ["sqrt", 0.5, 0.75]
      random_forest_bootstrap: [true, false]
      xgboost_n_estimators: [200, 1000]
      xgboost_learning_rate: [5.0e-3, 0.1]
      xgboost_max_depth: [3, 8]
      xgboost_min_child_weight: [1, 10]
      xgboost_subsample: [0.5, 1.0]
      xgboost_colsample_bytree: [0.5, 1.0]
      xgboost_gamma: [0.0, 4.0]
      xgboost_reg_alpha: [1.0e-6, 5.0]
      xgboost_reg_lambda: [1.0e-6, 20.0]
      xgboost_max_bin: [128, 384]
      # Dynamic MLP architecture search:
      # - sample number of hidden layers from mlp_num_layers (inclusive range)
      # - sample units for each layer independently from mlp_hidden_units
      # Legacy fallback (still supported): mlp_hidden_layers as explicit list.
      mlp_num_layers: [1, 3]
      mlp_hidden_units: [64, 128, 256, 512]
      mlp_activation: ["relu", "tanh"]
      mlp_batch_size: [32, 64, 128]
      mlp_alpha: [1.0e-6, 1.0e-2]
      mlp_learning_rate_init: [5.0e-5, 2.0e-3]
      gpr_alpha: [1.0e-8, 1.0e-2]
      gpr_kernel:
        - "rbf"
        - "matern15"
        - "matern25"
      gpr_length_scale: [5.0e-2, 20.0]
      gpr_kernel_variance: [5.0e-2, 5.0]
      gpr_max_iters: [80, 250]

  step4_3_2_classification:
    tune: true
    n_trials: 50
    tuning_cv_folds: 5
    tuning_objective: "val_balanced_accuracy"
    models:
      - "logistic"
      - "random_forest"
      - "xgboost"
      - "mlp"
      - "gpc"
    optuna_search_space:
      logistic_c: [1.0e-4, 1.0e2]
      logistic_penalty: ["l1", "l2"]
      logistic_class_weight: ["none", "balanced"]
      random_forest_n_estimators: [200, 800]
      random_forest_max_depth: [3, 20]
      random_forest_min_samples_split: [2, 12]
      random_forest_min_samples_leaf: [1, 6]
      random_forest_max_features: ["sqrt", 0.5, 0.75]
      random_forest_bootstrap: [true, false]
      random_forest_class_weight: ["none", "balanced", "balanced_subsample"]
      xgboost_n_estimators: [200, 1000]
      xgboost_learning_rate: [5.0e-3, 0.1]
      xgboost_max_depth: [3, 8]
      xgboost_min_child_weight: [1, 10]
      xgboost_subsample: [0.5, 1.0]
      xgboost_colsample_bytree: [0.5, 1.0]
      xgboost_gamma: [0.0, 4.0]
      xgboost_reg_alpha: [1.0e-6, 5.0]
      xgboost_reg_lambda: [1.0e-6, 20.0]
      xgboost_scale_pos_weight: [0.25, 5.0]
      xgboost_max_bin: [128, 384]
      # Dynamic MLP architecture search:
      # - sample number of hidden layers from mlp_num_layers (inclusive range)
      # - sample units for each layer independently from mlp_hidden_units
      # Legacy fallback (still supported): mlp_hidden_layers as explicit list.
      mlp_num_layers: [1, 3]
      mlp_hidden_units: [64, 128, 256, 512]
      mlp_activation: ["relu", "tanh"]
      mlp_batch_size: [32, 64, 128]
      mlp_alpha: [1.0e-6, 1.0e-2]
      mlp_learning_rate_init: [5.0e-5, 2.0e-3]
      gpc_kernel:
        - "rbf"
        - "matern15"
        - "matern25"
      gpc_length_scale: [5.0e-2, 20.0]
      gpc_kernel_constant: [5.0e-2, 10.0]
      gpc_noise_level: [1.0e-7, 1.0e-2]
      gpc_n_restarts_optimizer: [0, 2]
      gpc_max_iter_predict: [80, 200]

  step4_4_comparation:
    model_sizes: ["small", "medium", "large", "xl"]
    # Output folders under traditional_step4/:
    # - results_4_4_comparation_polymer
    # - results_4_4_comparation_random
